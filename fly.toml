# fly.toml app configuration file generated for isitgood-surf on 2026-04-10T09:55:22-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'isitgood-surf'
primary_region = 'iad'

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = "surf_data"
  destination = "/app/data"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
